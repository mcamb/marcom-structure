version: '3'
services:

  app:
    build:
      context: ./nodejs
      dockerfile: Dockerfile
      args:
        - SOFTWARE_VERSION_TAG=${SOFTWARE_VERSION_TAG}
    restart: unless-stopped
    container_name: app-nodejs
    ports:
      - '172.17.0.1:3000:3000'
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://root:${SOFTWARE_PASSWORD}@mongo:27017/

  mongo:
    image: mongo
    restart: always
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${SOFTWARE_PASSWORD}
    volumes:
      - /opt/app/mongodb:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    container_name: mono-express
    ports:
      - '172.17.0.1:8081:8081'
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: ${SOFTWARE_PASSWORD}
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${SOFTWARE_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://root:${SOFTWARE_PASSWORD}@mongo:27017/
    depends_on:
      - mongo
